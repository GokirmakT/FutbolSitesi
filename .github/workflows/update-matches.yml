name: Update Matches DB

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *' # her gün 00:00 UTC
  workflow_dispatch:

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node kur
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Bağımlılıkları temiz kur (EN ÖNEMLİ KISIM)
      - name: Install dependencies
        run: npm ci

      # 4. SQLite native modülünü Linux için garantiye al
      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      # 5. Script çalıştır
      - name: Run matches script
        run: node scripts/Matches.js

      # 6. DB değiştiyse commit et
      - name: Commit and push DB changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add futbol.db
          git commit -m "Update futbol.db [Automated]" || echo "No changes to commit"
          git push
